<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dean – Activity Log</title>
  <link rel="stylesheet" href="../Asset/CSS/dean.css"/>
  <style>
    .log-controls { display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin:20px 0 16px; }
    .log-search { flex:1; min-width:200px; padding:9px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:0.88rem; font-family:inherit; }
    .log-filter { padding:8px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:0.85rem; background:#fff; font-family:inherit; cursor:pointer; }
    .log-table { width:100%; border-collapse:collapse; font-size:0.87rem; }
    .log-table th { background:#f1f5f9; color:#475569; font-weight:600; padding:10px 14px; text-align:left; border-bottom:2px solid #e2e8f0; }
    .log-table td { padding:10px 14px; border-bottom:1px solid #f1f5f9; vertical-align:top; }
    .log-table tr:hover td { background:#f8fafc; }
    .role-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.78rem; font-weight:600; }
    .role-Admin       { background:#dbeafe; color:#1d4ed8; }
    .role-Dean        { background:#f3e8ff; color:#7c3aed; }
    .role-DeptStaff   { background:#fef9c3; color:#92400e; }
    .role-Maintenance { background:#dcfce7; color:#15803d; }
    .role-Student     { background:#f1f5f9; color:#475569; }
    .report-id  { font-weight:600; color:#b01c1c; font-size:0.82rem; }
    .detail-text { color:#64748b; font-size:0.82rem; margin-top:3px; }
    .time-text  { color:#94a3b8; font-size:0.82rem; white-space:nowrap; }
    .empty-log  { text-align:center; color:#94a3b8; padding:40px; }
    .log-count  { font-size:0.85rem; color:#64748b; margin-bottom:8px; }
  </style>
</head>
<body>
  <nav>
    <div class="navbar">
      <div class="system">School Facility Reporting System</div>
      <ul class="nav-links">
        <li><a href="deanDashboard.html">Home</a></li>
        <li><a href="deanActivityLog.html" class="active">Activity Log</a></li>
        <li><a href="logout.html">Logout</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h2>System Activity Log</h2>
      <p>Oversee all actions taken by students, dept staff, admin, and maintenance</p>
    </div>

    <div class="log-controls">
      <input type="text" class="log-search" id="logSearch" placeholder="Search by role, action, report ID..." oninput="renderLog()">
      <select class="log-filter" id="roleFilter" onchange="renderLog()">
        <option value="all">All Roles</option>
        <option value="Admin">Admin</option>
        <option value="Dean">Dean</option>
        <option value="Dept Staff">Dept Staff</option>
        <option value="Maintenance">Maintenance</option>
        <option value="Student">Student</option>
      </select>
    </div>

    <div class="log-count" id="logCount"></div>

    <div style="overflow-x:auto;">
      <table class="log-table">
        <thead>
          <tr>
            <th>Date &amp; Time</th>
            <th>Role</th>
            <th>Actor</th>
            <th>Action</th>
            <th>Report</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </main>

  <script src="../Asset/JS/sharedData.js"></script>
  <script>
  function renderLog() {
    const q = document.getElementById('logSearch').value.toLowerCase();
    const roleFilter = document.getElementById('roleFilter').value;
    let log = getLog();

    log = log.filter(entry => {
      const matchRole = roleFilter === 'all' || entry.role === roleFilter;
      const matchSearch = !q || [entry.actor, entry.role, entry.action, entry.reportId, entry.detail]
        .join(' ').toLowerCase().includes(q);
      return matchRole && matchSearch;
    });

    document.getElementById('logCount').textContent = `Showing ${log.length} entr${log.length === 1 ? 'y' : 'ies'}`;

    const tbody = document.getElementById('logBody');
    if (log.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty-log">No activity logged yet.</td></tr>`;
      return;
    }

    const roleCls = { 'Admin':'Admin', 'Dean':'Dean', 'Dept Staff':'DeptStaff', 'Maintenance':'Maintenance', 'Student':'Student' };
    tbody.innerHTML = log.map(e => `
      <tr>
        <td class="time-text">${e.displayTime}</td>
        <td><span class="role-badge role-${roleCls[e.role] || 'Student'}">${e.role}</span></td>
        <td>${e.actor}</td>
        <td>${e.action}</td>
        <td>
          ${e.reportId ? `<div class="report-id">${e.reportId}</div>` : ''}
          ${e.detail   ? `<div class="detail-text">${e.detail}</div>` : ''}
        </td>
      </tr>`).join('');
  }

  renderLog();
  </script>
</body>
</html>
