<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Status</title>
    <link rel="stylesheet" href="../Asset/CSS/trackcss.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<nav>
    <div class="navbar">
        <div class="system">School Facility Reporting System</div>
        <ul class="nav-links" id="navLinks">
            <li><a href="../Pages/dashboard.html">Home</a></li>
            <li><a href="../Pages/report.html">Report</a></li>
            <li><a href="../Pages/track.html" class="active">Track</a></li>
            <li><a href="../Pages/profile.html">Profile</a></li>
        </ul>
        <div class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></div>
    </div>
</nav>

<div class="container">
    <header>
        <div class="header-nav"><h2>Track Your Reports</h2></div>
        <p>Monitor your submitted facility reports</p>
    </header>

    <!-- Workflow guide -->
    <div style="background:#f1f5f9;border-radius:12px;padding:14px 18px;margin-bottom:18px;font-size:0.82rem;color:#475569;">
        <strong>📋 Report Journey:</strong><br>
        <span style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">
            <span style="background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:3px 8px;">1️⃣ Submitted</span>
            <span>→</span>
            <span style="background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:3px 8px;">2️⃣ Dept. Staff Reviews</span>
            <span>→</span>
            <span style="background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:3px 8px;">3️⃣ Dean or Admin Approves</span>
            <span>→</span>
            <span style="background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:3px 8px;">4️⃣ Maintenance Fixes</span>
            <span>→</span>
            <span style="background:#16a34a;color:#fff;border-radius:6px;padding:3px 8px;">5️⃣ Resolved ✅</span>
        </span>
    </div>

    <div class="search-container">
        <i data-lucide="search" class="icon-muted"></i>
        <input type="text" id="searchInput" placeholder="Search by ID, type, or location...">
    </div>

    <div class="filters" id="filterContainer">
        <button class="filter-chip active" data-filter="all">All <span class="count-badge" id="countAll">0</span></button>
        <button class="filter-chip" data-filter="pending">Pending <span class="count-badge" id="countPending">0</span></button>
        <button class="filter-chip" data-filter="in-progress">In Progress <span class="count-badge" id="countInProgress">0</span></button>
        <button class="filter-chip" data-filter="resolved">Resolved <span class="count-badge" id="countResolved">0</span></button>
        <button class="filter-chip" data-filter="rejected">Rejected <span class="count-badge" id="countRejected">0</span></button>
    </div>

    <div id="cardList"></div>
</div>

<script src="../Asset/JS/hamburger.js"></script>
<script src="../Asset/JS/track2.js"></script>

</body>
</html>
