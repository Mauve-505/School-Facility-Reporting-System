<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report an Issue</title>
    <link rel="stylesheet" href="../Asset/CSS/report.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav>
    <div class="navbar">
        <div class="system">School Facility Reporting System</div>
        <ul class="nav-links" id="navLinks">
            <li><a href="../Pages/dashboard.html">Home</a></li>
        <li><a href="../Pages/report.html">Report</a></li>
        <li><a href="../Pages/track.html">Track</a></li>
        <li><a href="../Pages/profile.html">Profile</a></li>
        </ul>
        <div class="hamburger" id="hamburger">
            <i class="fa-solid fa-bars"></i>
        </div>
    </div>
</nav>

<div class="page-header">
    <h2>Submit a Request</h2>
    <p>Report a facility issue for review</p>
</div>

<div id="formbox">
    <p id="detailstxt">DETAILS</p>
    <hr><br>

    <p><b>1. CHOOSE A REQUEST</b></p>
    <select id="myselect">
        <option>-</option>
        <option>Electrical Issue</option>
        <option>Plumbing Issue</option>
        <option>HVAC / Ventilation</option>
        <option>Furniture / Equipment</option>
        <option>IT / Technology</option>
        <option>Cleaning / Sanitation</option>
        <option>Structural / Safety</option>
        <option>Other</option>
    </select>

    <br><br><br>

    <p><b>2. SELECT DEPARTMENT</b></p>
    <br>
    <select id="department" onchange="updateRooms()">
        <option value="">-- Select Department --</option>
        <option value="ccs">College of Computing Studies</option>
        <option value="csm">College of Science and Mathematics</option>
        <option value="ccje">College of Criminal Justice Education</option>
        <option value="carch">College of Architecture</option>
        <option value="cais">College of Asian &amp; Islamic Studies</option>
        <option value="coe">College of Engineering</option>
        <option value="che">College of Home Economics</option>
        <option value="claw">College of Law</option>
        <option value="cla">College of Liberal Arts</option>
        <option value="cmed">College of Medicine</option>
        <option value="cnurs">College of Nursing</option>
        <option value="cpads">College of Public Administration &amp; Development Studies</option>
        <option value="cswcd">College of Social Work &amp; Community Development</option>
        <option value="cte">College of Teacher Education</option>
        <option value="csspe">College of Sports Science &amp; Physical Education (CSSPE)</option>
    </select>

    <br><br><br>

    <p><b>3. SELECT ROOM</b></p>
    <br>
    <select id="room">
        <option value="">-- Select Room --</option>
    </select>

    <br><br><br>

    <p><b>4. DESCRIBE THE ISSUE</b></p>
    <br>
    <textarea id="textbox" placeholder="Please provide detailed information..."></textarea>

    <br><br>

    <p><b>5. ATTACH A PHOTO</b></p>
    <br>
    <input type="file" id="photoinput" accept="image/*" onchange="showPreview()">

    <div id="photobox" onclick="document.getElementById('photoinput').click()">
        📷 Click here to upload a photo
    </div>

    <img id="previewimg" style="display:none;">

    <br><br>

    <button onclick="submitForm()" id="submit">Submit Request</button>
</div>

<script>
function updateRooms() {
    const department = document.getElementById("department").value;
    const room = document.getElementById("room");

    room.innerHTML = '<option value="">-- Select Room --</option>';

    let rooms = [];

    if (department === "ccs") {
        rooms = ["LR 1", "LR 2", "LR 3", "LR 4", "LR 5", "LAB 1", "LAB 2"];
    } else if (department === "csm") {
        rooms = ["Room 101", "Room 102", "Room 103", "Chemistry Lab", "Physics Lab"];
    } else if (department === "ccje") {
        rooms = ["CJ Room 1", "CJ Room 2", "Simulation Room"];
    } else if (department === "carch") {
        rooms = ["Design Studio A", "Design Studio B", "Drafting Room 1", "Drafting Room 2", "Model Workshop", "Critique Hall"];
    } else if (department === "cais") {
        rooms = ["Seminar Room 1", "Seminar Room 2", "Language Lab", "Asian Studies Hall", "Islamic Studies Room", "Research Room 3"];
    } else if (department === "coe") {
        rooms = ["Eng Lab 1", "Eng Lab 2", "Fabrication Shop", "Hydraulics Lab", "Electronics Room", "CAD Room", "Testing Area"];
    } else if (department === "che") {
        rooms = ["Food Lab 1", "Food Lab 2", "Textile Room", "Demo Kitchen", "Nutrition Lab", "Home Mgmt House"];
    } else if (department === "claw") {
        rooms = ["Moot Court", "Law Library", "LR 401", "LR 402", "Legal Aid Office", "Conference Room A"];
    } else if (department === "cla") {
        rooms = ["Lecture Hall 1", "Lecture Hall 2", "Room 205", "Room 206", "Room 310", "Language Center"];
    } else if (department === "cmed") {
        rooms = ["Anatomy Lab", "Physiology Lab", "Cadaver Room", "Lecture Hall M1", "Lecture Hall M2", "Skills Lab"];
    } else if (department === "cnurs") {
        rooms = ["Nursing Lab 1", "Nursing Lab 2", "Skills Training Room", "Simulation Ward", "Room N101", "Room N102"];
    } else if (department === "cpads") {
        rooms = ["Policy Room 1", "Policy Room 2", "Governance Lab", "Seminar Hall PA", "Research Office", "Room PA3"];
    } else if (department === "cswcd") {
        rooms = ["Social Work Lab", "Community Room 1", "Community Room 2", "Counseling Room", "SW Seminar Hall", "Field Office"];
    } else if (department === "cte") {
        rooms = ["Demo Teaching Room", "Education Lab", "Micro-Teaching Studio", "Room TE201", "Room TE202", "Resource Center"];
    } else if (department === "csspe") {
        rooms = ["Gymnasium", "Fitness Center", "Sports Science Lab", "Athletic Training Room", "Dance Studio", "Swimming Pool Area"];
    }

    rooms.forEach(r => {
        let option = document.createElement("option");
        option.text = r;
        room.add(option);
    });
}

function showPreview() {
    const file = document.getElementById("photoinput").files[0];
    const preview = document.getElementById("previewimg");
    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
}

function submitForm() {
    const request = document.getElementById("myselect").value;
    const department = document.getElementById("department").value;
    const room = document.getElementById("room").value;
    const description = document.getElementById("textbox").value;

    if (!request || request === "-" || !department || !room || !description) {
        alert("Please fill out all fields!");
        return;
    }

    const reports = JSON.parse(localStorage.getItem("facilityReports") || "[]");
    const nextNum = reports.length + 1;
    const reportId = "RPT-" + String(nextNum).padStart(3, "0");

    const deptSelect = document.getElementById("department");
    const deptLabel = deptSelect.options[deptSelect.selectedIndex].text;

    const now = new Date();
    const submittedAt = now.toISOString().slice(0, 10) + " " +
        now.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });

    const newReport = {
        id: reportId,
        type: request,
        department: deptLabel,
        room: room,
        description: description,
        status: "pending",
        submittedAt: submittedAt,
        updatedAt: submittedAt
    };

    reports.push(newReport);
    localStorage.setItem("facilityReports", JSON.stringify(reports));

    alert("Request " + reportId + " submitted successfully!");
    window.location.href = "../Pages/track.html";
}

document.getElementById("hamburger").onclick = () => {
    document.getElementById("navLinks").classList.toggle("active");
};
</script>

</body>
</html>
