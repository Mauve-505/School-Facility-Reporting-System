<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile – School Facility Reporting System</title>
<link rel="stylesheet" href="../Asset/CSS/profile.css">
</head>

<body>

<nav>
    <div class="navbar">
        <div class="system">School Facility Reporting System</div>
        <ul class="nav-links" id="navLinks">
            <li><a href="../Pages/dashboard.html">Home</a></li>
            <li><a href="../Pages/report.html">Report</a></li>
            <li><a href="../Pages/track.html">Track</a></li>
            <li><a href="../Pages/profile.html" class="active">Profile</a></li>
        </ul>
        <div class="hamburger" id="hamburger">&#9776;</div>
    </div>
</nav>

<div class="container">

<h1>My Profile</h1>
<p class="information">Manage your account information</p>

<div class="profile-card">
    <div class="profile"></div>
    <h2 id="profileName">—</h2>
    <p class="student-num" id="profileEmail">—</p>
</div>

<div class="card">
<h3>Personal Information</h3>

<div class="info">
<label>Full Name</label>
<div class="field" id="fieldName">—</div>
</div>

<div class="info">
<label>Email Address</label>
<div class="field" id="fieldEmail">—</div>
</div>

<div class="info">
<label>Phone Number</label>
<div class="field" id="fieldPhone">—</div>
</div>

<div class="info">
<label>College / Department</label>
<div class="field" id="fieldCollege">—</div>
</div>

</div>

<div class="card">
<h3>Verified Documents</h3>
<div id="verifiedDocs">
    <p style="color:#94a3b8;font-size:0.9rem;">No documents on record.</p>
</div>
</div>

<div class="card">
<h3>Account Settings</h3>
<div class="setting">Change Password</div>
<div class="setting logout" onclick="logout()">Logout</div>
</div>

</div>

<script src="../Asset/JS/hamburger.js"></script>
<script>
function logout() {
    window.location.href = 'logout.html';
}

// Load registration data saved during register
const reg = JSON.parse(localStorage.getItem('registrationData') || 'null');
if (reg) {
    const fullName = (reg.given + ' ' + (reg.mi ? reg.mi + '. ' : '') + reg.lastname).trim();
    document.getElementById('profileName').textContent = fullName;
    document.getElementById('profileEmail').textContent = reg.email || '—';
    document.getElementById('fieldName').textContent = fullName;
    document.getElementById('fieldEmail').textContent = reg.email || '—';
    document.getElementById('fieldPhone').textContent = reg.phone || '—';
    document.getElementById('fieldCollege').textContent = reg.college || '—';

    if (reg.docs && reg.docs.length > 0) {
        document.getElementById('verifiedDocs').innerHTML = reg.docs.map(d => `
            <div class="verified-doc">
                ${d}
                <p>Verified during registration</p>
            </div>`).join('');
    }
}
</script>

</body>
</html>
