<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="../Asset/CSS/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="navbar">
            <div class="system">School Facility Reporting System</div>
            <ul class="nav-links" id="navLinks">
                <li><a href="../Pages/dashboard.html" class="active">Home</a></li>
                <li><a href="../Pages/report.html">Report</a></li>
                <li><a href="../Pages/track.html">Track</a></li>
                <li><a href="../Pages/profile.html">Profile</a></li>
            </ul>
            <div class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></div>
        </div>
    </nav>

    <div class="main-content">
        <h2>Student Dashboard</h2>
        <p>Welcome back, <strong id="welcomeName">Student</strong>! Manage your facility reports.</p>

        <a href="../Pages/report.html" class="new-task">+ Report New Issue</a>
        <a href="../Pages/track.html" class="track-bttn">Track Reports</a>

        <div class="stats">
            <div class="card">
                <p class="Label orange">Pending Review</p>
                <h3 class="Value orange" id="statPending">0</h3>
            </div>
            <div class="card">
                <p class="Label blue">In Progress</p>
                <h3 class="Value blue" id="statInProgress">0</h3>
            </div>
            <div class="card">
                <p class="Label green">Resolved</p>
                <h3 class="Value green" id="statResolved">0</h3>
            </div>
        </div>

        <div class="submitted">
            <i class="fa-regular fa-clipboard list"></i>
            <span>My Submitted Reports</span>
        </div>

        <div class="reportList" id="reportList"></div>
    </div>

    <script src="../Asset/JS/hamburger.js"></script>
    <script src="../Asset/JS/dashboard.js"></script>
</body>
</html>
