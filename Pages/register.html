<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – School Facility Reporting System</title>
  <link rel="stylesheet" href="../Asset/CSS/register.css">
  <link rel="stylesheet" href="../Asset/CSS/registerextra.css">
</head>
<body>
  <div class="card">

    <a class="back-link" href="../Pages/login.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back to Login
    </a>

    <div class="header">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 3h16a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zm1 2v14h14V5H5zm2 2h10v2H7V7zm0 4h10v2H7v-2zm0 4h6v2H7v-2z"/>
        </svg>
      </div>
      <h1>Create Account</h1>
      <p class="subtitle">Verify your student status to continue</p>
    </div>

    <!-- Name Fields -->
    <div class="field-row">
      <div class="field">
        <label for="lastname">Last Name</label>
        <input type="text" id="lastname" placeholder="Enter last name">
      </div>
      <div class="field">
        <label for="given">Given Name</label>
        <input type="text" id="given" placeholder="Enter given name">
      </div>
      <div class="field field-mi">
        <label for="mi">M.I.</label>
        <input type="text" id="mi" placeholder="M.I." maxlength="2">
      </div>
    </div>

    <!-- College Dropdown -->
    <div class="field">
      <label for="college">College / Department</label>
      <select id="college">
        <option value="" disabled selected>Select your college</option>
        <option>College of Agriculture</option>
        <option>College of Architecture</option>
        <option>College of Asian &amp; Islamic Studies</option>
        <option>College of Computing Studies</option>
        <option>College of Criminal Justice Education</option>
        <option>College of Engineering</option>
        <option>College of Forestry &amp; Environmental Studies</option>
        <option>College of Home Economics</option>
        <option>College of Law</option>
        <option>College of Liberal Arts</option>
        <option>College of Medicine</option>
        <option>College of Nursing</option>
        <option>College of Public Administration &amp; Development Studies</option>
        <option>College of Science and Mathematics</option>
        <option>College of Social Work &amp; Community Development</option>
        <option>College of Teacher Education</option>
        <option>College of Sports Science &amp; Physical Education (CSSPE)</option>
      </select>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email">
    </div>

    <div class="field">
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" placeholder="Enter your phone number" maxlength="15">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Create a password">
    </div>

    <div class="field">
      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Confirm your password">
    </div>

    <div class="field">
      <p class="doc-label">Document Verification <span>(Select 2 documents)</span></p>

      <div class="doc-option" onclick="toggleDoc(this)">
        <div class="doc-checkbox">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="doc-icon">
          <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <span class="doc-name">Certificate of Registration</span>
      </div>

      <div class="doc-option" onclick="toggleDoc(this)">
        <div class="doc-checkbox">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="doc-icon">
          <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <span class="doc-name">Student ID card</span>
      </div>

      <div class="doc-option" onclick="toggleDoc(this)">
        <div class="doc-checkbox">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="doc-icon">
          <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <span class="doc-name">Official enrollment form / registration slip</span>
      </div>

      <p class="selected-count" id="selected-count">Selected: 0 of 2</p>
    </div>

    <div id="upload-section" style="display:none;">
      <div class="field">
        <p class="doc-label">Upload Photos <span>(of your selected documents)</span></p>
        <div id="upload-slots"></div>
      </div>
    </div>

    <button class="create-btn" type="button" onclick="handleRegister()">Create Account</button>

  </div>

  <script>
    const MAX_SELECTIONS = 2;

    function toggleDoc(el) {
      const isSelected = el.classList.contains('selected');
      const currentCount = document.querySelectorAll('.doc-option.selected').length;
      if (!isSelected && currentCount >= MAX_SELECTIONS) return;
      el.classList.toggle('selected');
      updateCount();
      renderUploadSlots();
    }

    function updateCount() {
      const count = document.querySelectorAll('.doc-option.selected').length;
      document.getElementById('selected-count').textContent = `Selected: ${count} of 2`;
    }

    function renderUploadSlots() {
      const selected = document.querySelectorAll('.doc-option.selected');
      const section = document.getElementById('upload-section');
      const slots = document.getElementById('upload-slots');

      if (selected.length === 0) {
        section.style.display = 'none';
        slots.innerHTML = '';
        return;
      }

      section.style.display = 'block';
      slots.innerHTML = '';

      selected.forEach((doc, i) => {
        const docName = doc.querySelector('.doc-name').textContent;
        const id = 'doc-upload-' + i;
        const slot = document.createElement('div');
        slot.style.marginBottom = '14px';
        slot.innerHTML = `
          <label style="font-size:0.85rem;color:#555;display:block;margin-bottom:6px;">${docName}</label>
          <input type="file" id="${id}" accept="image/*" style="display:none" onchange="showThumb(this, '${id}-thumb')">
          <div onclick="document.getElementById('${id}').click()" style="
            border: 2px dashed #cbd5e1;
            border-radius: 10px;
            padding: 18px;
            text-align: center;
            cursor: pointer;
            color: #94a3b8;
            font-size: 0.85rem;
            background: #f8fafc;
            transition: border-color 0.2s;
          " onmouseover="this.style.borderColor='#6366f1'" onmouseout="this.style.borderColor='#cbd5e1'">
            📷 Click to upload photo
          </div>
          <img id="${id}-thumb" style="display:none;margin-top:8px;max-width:100%;max-height:140px;border-radius:8px;object-fit:cover;">
        `;
        slots.appendChild(slot);
      });
    }

    function showThumb(input, thumbId) {
      const thumb = document.getElementById(thumbId);
      if (input.files && input.files[0]) {
        thumb.src = URL.createObjectURL(input.files[0]);
        thumb.style.display = 'block';
      }
    }

    function handleRegister() {
      var lastname = document.getElementById('lastname').value.trim();
      var given = document.getElementById('given').value.trim();
      var college = document.getElementById('college').value;
      var email = document.getElementById('email').value.trim();
      var phone = document.getElementById('phone').value.trim();
      var password = document.getElementById('password').value;
      var confirm = document.getElementById('confirm-password').value;
      var count = document.querySelectorAll('.doc-option.selected').length;

      if (!lastname || !given || !college || !email || !phone || !password || !confirm) {
        alert('Please fill in all required fields.');
        return;
      }
      if (password !== confirm) {
        alert('Passwords do not match.');
        return;
      }
      if (count < 2) {
        alert('Please select 2 documents.');
        return;
      }

      window.location.href = 'regsuccess.html';
    }
  </script>

</body>
</html>
