<!DOCTYPE html>
<html>
<head>
  <title>School Facility Reporting System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">

    <img src="../img/logo.png" class="logo" onerror="this.style.display='none'">

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 3h16a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zm1 2v14h14V5H5zm2 2h10v2H7V7zm0 4h10v2H7v-2zm0 4h6v2H7v-2z"/>
      </svg>
    </div>

    <h1>School Facility Reporting System</h1>
    <p class="subtitle">Admin Login</p>

    <form class="form" action="../admindashboard/admindashboard.html">

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email">
      </div>

      <div class="field">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" placeholder="Enter your password">
          <button class="eye-btn" onclick="showHidePassword()" type="button">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="login-btn" type="submit">Login</button>

      <a class="student-link" href="../login/login.html">Login as Student</a>

    </form>
  </div>

  <script>
    function showHidePassword() {
      var input = document.getElementById('password')

      if (input.type == "password") {
        input.type = "text"
      } else {
        input.type = "password"
      }
    }
  </script>

</body>
</html>
