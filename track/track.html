<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="track.css">

    <title>Track Status</title>
</head>
<body>
    <div class="topbar">
        <a href="dashboard.html" id="backbtn">&#8592; Track Status</a>
        <br>
        <small style="color: gray; margin-left: 5px;">Monitor your submitted reports</small>
    </div>

    <br>    

    <div class="mainbox">
        <div class="searchbox">
            <input type="text" class="searchinput" placeholder="Search by ID, type, or location...">
        </div>
        <br>
        <div class="filterbtns">
            <button class="filterbtn active" onclick="filterStatus('All')">All (5)</button>
            <button class="filterbtn" onclick="filterStatus('Pending')">Pending (2)</button>
            <button class="filterbtn" onclick="filterStatus('In Progress')">In Progress (1)</button>
            <button class="filterbtn" onclick="filterStatus('Resolved')">Resolved (1)</button>
            <button class="filterbtn" onclick="filterStatus('Rejected')">Rejected (1)</button>
        </div>
        <br>
        <div class="cardlist">

        </div>
    </div>
    
</body>
</html>
