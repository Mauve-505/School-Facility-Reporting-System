<!DOCTYPE html>
<html>
<head>
  <title>School Facility Reporting System</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-image: linear-gradient(135deg, rgba(0,0,0,0.82) 0%, rgba(22,22,22,0.72) 45%, rgba(56,56,56,0.62) 100%), url('../img/bg.jpg');
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      background-blend-mode: overlay;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 28px;
      padding: 72px 72px 68px;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 8px 40px rgba(80,80,160,0.10), 0 2px 8px rgba(0,0,0,0.04);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .back-link {
      align-self: flex-start;
      color: #111111;
      font-size: 1rem;
      font-weight: 500;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
    }

    .back-link:hover {
      color: #b01c1c;
    }

    .icon-wrap {
      width: 100px;
      height: 100px;
      border-radius: 24px;
      background-color: #b01c1c;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      box-shadow: 0 4px 16px rgba(176,28,28,0.30);
    }

    .icon-wrap svg {
      width: 56px;
      height: 56px;
    }

    h1 {
      font-size: 2.3rem;
      font-weight: 700;
      color: #111111;
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #8b8fa8;
      margin-bottom: 44px;
      text-align: center;
    }

    .continue-btn {
      width: 100%;
      display: block;
      padding: 20px;
      border: none;
      border-radius: 14px;
      background-color: #b01c1c;
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(176,28,28,0.25);
    }

    .continue-btn:hover {
      background-color: #8b0e0e;
      box-shadow: 0 6px 20px rgba(176,28,28,0.30);
    }

    .continue-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 768px) {
      body {
        padding: 24px 16px;
        align-items: flex-start;
        padding-top: 40px;
      }

      .card {
        padding: 40px 28px 36px;
        border-radius: 20px;
      }

      .icon-wrap {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        margin-bottom: 20px;
      }

      .icon-wrap svg {
        width: 38px;
        height: 38px;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 6px;
      }

      .subtitle {
        font-size: 0.95rem;
        margin-bottom: 28px;
      }

      .continue-btn {
        padding: 14px;
        font-size: 1rem;
        border-radius: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="card">

    <a href="../index.html" class="back-link">&#8592; Back</a>

    <img src="../img/logo.png" class="logo" onerror="this.style.display='none'" style="width:80px; margin-bottom:10px;">

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="9" stroke="white" stroke-width="1.8"/>
        <path d="M7.5 12.5l3 3 6-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>Login Successful!</h1>
    <p class="subtitle">Welcome back! You are now logged in as student.</p>

    <a href="../dashboard/dashboard.html" class="continue-btn">Continue to Dashboard</a>

  </div>

</body>
</html>
